name: Run Tests

on:
    pull_request:
        branches:
            - develop
            - main

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  pipx install poetry
                  poetry install

            - name: Run tests
              run: |
                  poetry run pytest
